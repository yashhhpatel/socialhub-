services:
  postgres:
    image: postgres:16-alpine
    container_name: socialhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: socialhub
      POSTGRES_PASSWORD: socialhub
      POSTGRES_DB: socialhub
    ports:
      - "5432:5432"
    volumes:
      - socialhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  socialhub_postgres_data:
