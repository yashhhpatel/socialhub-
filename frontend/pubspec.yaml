name: socialhub
description: "SocialHub — AI-powered social media operating system."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (see docs/architecture — Flutter Web Application Architecture, §2)
  flutter_riverpod: ^2.5.1

  # Routing (see docs/architecture — Flutter Web Application Architecture, §4)
  go_router: ^14.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
